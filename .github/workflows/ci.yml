name: CI Pipeline

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install poetry
        poetry install

    - name: Lint with flake8
      run: |
        # On utilise poetry run pour s'assurer que flake8 est celui du projet
        poetry run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Test with pytest
      run: |
        # On utilise poetry run pour s'assurer que pytest utilise ton environnement virtuel
        poetry run pytest
