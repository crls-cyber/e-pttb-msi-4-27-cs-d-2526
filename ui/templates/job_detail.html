{% extends "base.html" %}

{% block title %}Job Details - {{ t('app_title') }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Job Details</h1>
    <a href="/{{ lang }}/jobs" class="btn btn-secondary">← Back to Jobs</a>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="chart-card">
            <div class="chart-card-header">Job Information</div>
            <div id="jobInfo">Loading job details...</div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="chart-card">
            <div class="chart-card-header">Configuration</div>
            <div id="jobConfig">Loading configuration...</div>
        </div>
    </div>
</div>

<div class="chart-card mt-4">
    <div class="chart-card-header">Findings from this Job</div>
    <div id="jobFindings">Loading findings...</div>
</div>

<script>
const jobId = "{{ job_id }}";

// Fetch job details
fetch(`/api/jobs/${jobId}`)
    .then(response => response.json())
    .then(job => {
        // Job Info
        const status = job.status || 'unknown';
        const statusClass = status === 'completed' ? 'text-success' : 
                           status === 'failed' ? 'text-danger' : 
                           status === 'running' ? 'text-primary' : 'text-secondary';
        
        document.getElementById('jobInfo').innerHTML = `
            <table class="table">
                <tr><th>ID:</th><td><code>${job.id}</code></td></tr>
                <tr><th>Plugin:</th><td><strong>${job.plugin}</strong></td></tr>
                <tr><th>Status:</th><td><span class="${statusClass}">${status}</span></td></tr>
                <tr><th>Created:</th><td>${new Date(job.created_at).toLocaleString('fr-FR')}</td></tr>
                <tr><th>Started:</th><td>${job.started_at ? new Date(job.started_at).toLocaleString('fr-FR') : 'N/A'}</td></tr>
                <tr><th>Completed:</th><td>${job.completed_at ? new Date(job.completed_at).toLocaleString('fr-FR') : 'N/A'}</td></tr>
            </table>
        `;
        
        // Job Config
        document.getElementById('jobConfig').innerHTML = `
            <pre style="background: #f5f5f5; padding: 15px; border-radius: 5px; font-size: 0.9rem;">${JSON.stringify(job.config, null, 2)}</pre>
        `;
    })
    .catch(error => {
        document.getElementById('jobInfo').innerHTML = `<p>Error: ${error.message}</p>`;
    });

// Fetch findings for this job
fetch(`/api/findings?job_id=${jobId}`)
    .then(response => response.json())
    .then(data => {
        let findings = Array.isArray(data) ? data : (data.findings || []);
        
        if (findings.length > 0) {
            let html = '<table class="jobs-table"><thead><tr><th>Title</th><th>Severity</th><th>Description</th></tr></thead><tbody>';
            findings.forEach(f => {
                const severityClass = 'kpi-' + (f.severity || 'info');
                html += `<tr>
                    <td><strong>${f.title}</strong></td>
                    <td><span class="kpi-value ${severityClass}" style="font-size: 0.9rem;">${f.severity || 'info'}</span></td>
                    <td style="font-size: 0.95rem;">${(f.description || '').substring(0, 150)}...</td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('jobFindings').innerHTML = html;
        } else {
            document.getElementById('jobFindings').innerHTML = '<p>No findings for this job.</p>';
        }
    })
    .catch(error => {
        document.getElementById('jobFindings').innerHTML = `<p>Error: ${error.message}</p>`;
    });
</script>
{% endblock %}
