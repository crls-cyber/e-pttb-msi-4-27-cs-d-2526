<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pentest OS — Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#020b12; font-family:'Exo 2',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
        body::before { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px); background-size:40px 40px; }
        .box { position:relative; z-index:10; width:400px; }
        .logo { text-align:center; margin-bottom:32px; }
        .triangle { font-size:52px; color:#00d4ff; line-height:1; }
        .name { font-family:'Share Tech Mono',monospace; font-size:28px; color:#00d4ff; letter-spacing:8px; margin-top:8px; }
        .sub { font-family:'Share Tech Mono',monospace; font-size:9px; color:#4a7a8a; letter-spacing:4px; margin-top:6px; }
        .card { background:#061a27; border:1px solid #0e3a52; padding:36px; position:relative; }
        .card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,#00d4ff,transparent); }
        .card-title { font-family:'Share Tech Mono',monospace; font-size:9px; color:#00d4ff; letter-spacing:3px; text-transform:uppercase; margin-bottom:24px; }
        .card-title::before { content:'// '; color:#ff6b35; }
        label { display:block; font-family:'Share Tech Mono',monospace; font-size:9px; color:#4a7a8a; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; }
        input[type="text"], input[type="password"] { width:100%; background:rgba(0,212,255,0.04); border:1px solid #0e3a52; color:#c8e6f0; font-family:'Share Tech Mono',monospace; font-size:13px; padding:10px 14px; outline:none; margin-bottom:16px; transition:border-color 0.2s; }
        input:focus { border-color:#00d4ff; }
        .btn { width:100%; background:transparent; border:1px solid #00d4ff; color:#00d4ff; font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:3px; padding:12px; cursor:pointer; transition:all 0.2s; margin-top:8px; text-transform:uppercase; }
        .btn:hover { background:rgba(0,212,255,0.1); box-shadow:0 0 14px rgba(0,212,255,0.2); }
        .error { background:rgba(255,51,102,0.1); border:1px solid rgba(255,51,102,0.3); border-left:3px solid #ff3366; color:#ff8099; font-family:'Share Tech Mono',monospace; font-size:11px; padding:10px 14px; margin-bottom:16px; }
        .footer { display:flex; justify-content:space-between; margin-top:20px; padding-top:16px; border-top:1px solid #0e3a52; }
        .footer-item { font-family:'Share Tech Mono',monospace; font-size:9px; color:#4a7a8a; display:flex; align-items:center; gap:5px; }
        .dot { width:6px; height:6px; background:#00ff88; border-radius:50%; animation:blink 2s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .hint { text-align:center; margin-top:12px; font-family:'Share Tech Mono',monospace; font-size:9px; color:#4a7a8a; }
        .warning { text-align:center; margin-top:16px; font-family:'Share Tech Mono',monospace; font-size:9px; color:#ff6b35; opacity:0.7; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">
            <div class="triangle">△</div>
            <div class="name">PENTEST OS</div>
            <div class="sub">M1 CYBERSÉCURITÉ — SUP DE VINCI 2025/2026</div>
        </div>
        <div class="card">
            <div class="card-title">Authentification requise</div>
            {% if error %}<div class="error">⚠ {{ error }}</div>{% endif %}
            <form method="POST" action="/login">
                <label>Identifiant</label>
                <input type="text" name="username" placeholder="username" required autofocus>
                <label>Mot de passe</label>
                <input type="password" name="password" placeholder="••••••••" required>
                <button type="submit" class="btn">[ Accéder au système ]</button>
            </form>
            <div class="footer">
                <div class="footer-item"><div class="dot"></div>Système en ligne</div>
                <div class="footer-item">v2.0.0</div>
                <div class="footer-item">Pentest OS</div>
            </div>
        </div>
        <div class="hint">Default: admin / Admin123!</div>
        <div class="warning">⚠ Usage autorisé uniquement — Audits contractuels exclusivement</div>
    </div>
</body>
</html>
